<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>talent-hooker-debug</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 12px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      letter-spacing: 0.05em;
    }

    #status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #2a2a2a;
      color: #888;
    }

    #status.connected { background: #0f2e0f; color: #4caf50; }
    #status.disconnected { background: #2e0f0f; color: #f44336; }

    #count {
      margin-left: auto;
      font-size: 11px;
      color: #555;
    }

    #controls {
      padding: 8px 16px;
      background: #111;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      gap: 8px;
    }

    button {
      font-family: inherit;
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #1e1e1e;
      color: #ccc;
      cursor: pointer;
    }

    button:hover { background: #2a2a2a; color: #fff; }

    #filter {
      font-family: inherit;
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #1e1e1e;
      color: #ccc;
      width: 200px;
    }

    #filter::placeholder { color: #444; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .entry {
      display: grid;
      grid-template-columns: 160px 140px 160px 1fr;
      gap: 0 12px;
      padding: 5px 16px;
      border-bottom: 1px solid #161616;
      align-items: start;
      transition: background 0.1s;
    }

    .entry:hover { background: #151515; }

    .entry.hidden { display: none; }

    .ts { color: #555; white-space: nowrap; }

    .session {
      color: #7eb8f7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .type { font-weight: bold; }

    .type.agent-bootstrap  { color: #4caf50; }
    .type.command-new      { color: #4caf50; }
    .type.command-stop     { color: #f44336; }
    .type.command-reset    { color: #ff9800; }
    .type.message-received { color: #29b6f6; }
    .type.message-sent     { color: #ab47bc; }
    .type.session-compact-before { color: #ffc107; }
    .type.session-compact-after  { color: #8bc34a; }

    .payload {
      color: #777;
      word-break: break-all;
    }

    #empty {
      text-align: center;
      color: #333;
      margin-top: 60px;
      line-height: 2;
    }

    #empty span { font-size: 28px; display: block; margin-bottom: 8px; }

    .col-header {
      display: grid;
      grid-template-columns: 160px 140px 160px 1fr;
      gap: 0 12px;
      padding: 6px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      color: #444;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<header>
  <h1>talent-hooker-debug</h1>
  <span id="status">connecting...</span>
  <span id="count">0 events</span>
</header>

<div id="controls">
  <input id="filter" type="text" placeholder="filter by session or event type..." />
  <button id="btn-pause">Pause</button>
  <button id="btn-clear">Clear</button>
</div>

<div class="col-header">
  <span>received at</span>
  <span>session</span>
  <span>event type</span>
  <span>payload</span>
</div>

<div id="log">
  <div id="empty"><span>&#x2B55;</span>Waiting for hook events...<br>Make sure talent-hooker is installed and OpenClaw is running.</div>
</div>

<script>
  const log     = document.getElementById('log')
  const empty   = document.getElementById('empty')
  const status  = document.getElementById('status')
  const countEl = document.getElementById('count')
  const filter  = document.getElementById('filter')
  const btnPause = document.getElementById('btn-pause')
  const btnClear = document.getElementById('btn-clear')

  let paused = false
  let total  = 0
  let filterText = ''

  // SSE connection
  function connect() {
    const es = new EventSource('/events')

    es.onopen = () => {
      status.textContent = 'connected'
      status.className = 'connected'
    }

    es.onerror = () => {
      status.textContent = 'disconnected — retrying...'
      status.className = 'disconnected'
    }

    es.onmessage = (e) => {
      if (paused) return
      const event = JSON.parse(e.data)
      addEntry(event)
    }
  }

  function addEntry(event) {
    empty.style.display = 'none'
    total++
    countEl.textContent = `${total} event${total !== 1 ? 's' : ''}`

    const { sessionKey = '—', type = '—', receivedAt, ...rest } = event
    // Remove fields already shown as columns from the payload display
    const payload = Object.keys(rest).length ? JSON.stringify(rest) : ''

    const typeClass = type.replace(/:/g, '-')

    const row = document.createElement('div')
    row.className = 'entry'
    row.dataset.session = (sessionKey || '').toLowerCase()
    row.dataset.type = type.toLowerCase()

    row.innerHTML = `
      <span class="ts">${formatTime(receivedAt)}</span>
      <span class="session" title="${sessionKey}">${sessionKey}</span>
      <span class="type ${typeClass}">${type}</span>
      <span class="payload">${payload}</span>
    `

    if (filterText && !rowMatches(row, filterText)) {
      row.classList.add('hidden')
    }

    log.appendChild(row)
    log.scrollTop = log.scrollHeight
  }

  function formatTime(iso) {
    if (!iso) return '—'
    const d = new Date(iso)
    return d.toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0')
  }

  function rowMatches(row, text) {
    return row.dataset.session.includes(text) || row.dataset.type.includes(text)
  }

  filter.addEventListener('input', () => {
    filterText = filter.value.trim().toLowerCase()
    for (const row of log.querySelectorAll('.entry')) {
      row.classList.toggle('hidden', filterText && !rowMatches(row, filterText))
    }
  })

  btnPause.addEventListener('click', () => {
    paused = !paused
    btnPause.textContent = paused ? 'Resume' : 'Pause'
    btnPause.style.color  = paused ? '#ffc107' : ''
  })

  btnClear.addEventListener('click', () => {
    log.querySelectorAll('.entry').forEach(r => r.remove())
    empty.style.display = ''
    total = 0
    countEl.textContent = '0 events'
  })

  connect()
</script>
</body>
</html>
